name: poll-stations

# Git-scraping: poll the àVélo feeds on a schedule and commit any changes.
# Note: GitHub free-tier cron has a ~5 min minimum and can be delayed or skipped
# under load — fine for availability-trend history, not second-accurate.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: poll-stations
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Poll feeds
        run: python poll.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: poll $(date -u +%FT%TZ)"
            git push
          fi
