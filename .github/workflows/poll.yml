name: poll-stations

# Git-scraping: poll the àVélo feeds on a schedule and commit any changes.
# GitHub cron has a hard 5-min minimum, so each run polls 4x at ~75s spacing
# (≈ the source's 1-2 min update rhythm) and commits once at the end. The loop
# is kept under 5 min so runs don't overlap the next scheduled tick.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: poll-stations
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Poll feeds (4x at ~75s spacing)
        run: |
          for i in 1 2 3 4; do
            echo "--- poll $i/4 ---"
            python poll.py
            [ "$i" -lt 4 ] && sleep 75
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: poll $(date -u +%FT%TZ)"
            git push
          fi
